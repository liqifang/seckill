server:
  port: 8080

spring:
  # 本地开发环境 MySQL 数据源配置
  datasource:
    # 连接地址：数据库名为 xiaoha_seckill（1.1 小节中创建的）
    url: jdbc:mysql://localhost:3307/lifang-seckill?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    # 数据库用户名
    username: root
    # 数据库密码（改成你自己的密码）
    password: 123456
    # 数据库驱动类名
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池配置
    hikari:
      # 连接池名称
      pool-name: SeckillHikariPool
      # 最小空闲连接数
      minimum-idle: 10
      # 最大连接数
      maximum-pool-size: 50
      # 空闲连接超时时间（毫秒）
      idle-timeout: 300000
      # 连接最大存活时间（毫秒）
      max-lifetime: 900000
      # 获取连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接测试语句
      connection-test-query: SELECT 1

# MyBatis 开发环境专属配置
mybatis:
  configuration:
    # 开发阶段打印 SQL 语句，方便调试
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true


